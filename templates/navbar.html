<nav class="navbar navbar-expand-lg bg-dtblue">
    <div class="container-fluid">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="{% url "homepage" %}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url "applications:application-list" %}">Job Applications</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{% url "about" %}">About</a></li>
            {% if user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a id="navbarUserDropdown" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#"

                        <li><a class="dropdown-item" href="#" onclick="window.submitLogoutForm(event);">Log out</a></li>
                    </ul>
                </li>

                <form id="logout-form" method="post" action="{% url 'admin:logout' %}">
                    {% csrf_token %}
                </form>
            {% else %}
                <li class="nav-item"><a href="{% url 'login' %}">Log in</a></li>
